<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bgG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D47A1"/>
      <stop offset="50%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0A0E21"/>
    </linearGradient>
    <linearGradient id="sunG" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="60%" stop-color="#FF9800"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <linearGradient id="greenG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#43E97B"/>
      <stop offset="100%" stop-color="#38F9D7"/>
    </linearGradient>
    <radialGradient id="glowG" cx="50%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#FFD54F" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FFD54F" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="110" fill="url(#bgG)"/>

  <!-- Subtle kente border -->
  <g opacity="0.1">
    <line x1="55" y1="55" x2="55" y2="457" stroke="#FFD54F" stroke-width="2.5"/>
    <line x1="457" y1="55" x2="457" y2="457" stroke="#FFD54F" stroke-width="2.5"/>
    <line x1="55" y1="55" x2="457" y2="55" stroke="#FFD54F" stroke-width="2.5"/>
    <line x1="55" y1="457" x2="457" y2="457" stroke="#FFD54F" stroke-width="2.5"/>
  </g>

  <!-- Sun glow -->
  <circle cx="256" cy="220" r="150" fill="url(#glowG)"/>

  <!-- Sun circle -->
  <circle cx="256" cy="220" r="80" fill="url(#sunG)"/>

  <!-- Sun rays -->
  <g stroke="#FFD54F" stroke-width="4" stroke-linecap="round" opacity="0.45">
    <line x1="256" y1="120" x2="256" y2="100"/>
    <line x1="256" y1="320" x2="256" y2="340"/>
    <line x1="156" y1="220" x2="136" y2="220"/>
    <line x1="356" y1="220" x2="376" y2="220"/>
    <line x1="185" y1="149" x2="171" y2="135"/>
    <line x1="327" y1="149" x2="341" y2="135"/>
    <line x1="185" y1="291" x2="171" y2="305"/>
    <line x1="327" y1="291" x2="341" y2="305"/>
  </g>

  <!-- Phone handset inside sun -->
  <g transform="translate(256, 215) rotate(-30)">
    <rect x="-40" y="-12" width="80" height="24" rx="12" fill="#0D47A1"/>
    <rect x="-44" y="-22" width="28" height="44" rx="10" fill="#0D47A1"/>
    <rect x="16" y="-22" width="28" height="44" rx="10" fill="#0D47A1"/>
  </g>

  <!-- Signal arcs -->
  <g transform="translate(280, 185) rotate(-30)">
    <path d="M-14 -5 C-8 -16, 0 -20, 8 -20 C16 -20, 24 -16, 30 -5" fill="none" stroke="#0D47A1" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
    <path d="M-26 0 C-16 -22, 0 -30, 10 -30 C24 -30, 36 -22, 46 0" fill="none" stroke="#0D47A1" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Acacia trees -->
  <g opacity="0.15" transform="translate(110, 260)">
    <rect x="-2" y="25" width="4" height="40" fill="white"/>
    <ellipse cx="0" cy="15" rx="32" ry="18" fill="white"/>
    <ellipse cx="-12" cy="22" rx="20" ry="11" fill="white"/>
    <ellipse cx="14" cy="20" rx="22" ry="12" fill="white"/>
  </g>
  <g opacity="0.1" transform="translate(395, 275) scale(0.65)">
    <rect x="-2" y="25" width="4" height="35" fill="white"/>
    <ellipse cx="0" cy="15" rx="30" ry="16" fill="white"/>
    <ellipse cx="-10" cy="22" rx="18" ry="10" fill="white"/>
    <ellipse cx="12" cy="20" rx="20" ry="11" fill="white"/>
  </g>

  <!-- Horizon -->
  <line x1="70" y1="330" x2="442" y2="330" stroke="white" stroke-width="1" opacity="0.08"/>

  <!-- Green accent line -->
  <rect x="140" y="360" width="232" height="3" rx="1.5" fill="url(#greenG)" opacity="0.3"/>

  <!-- P H initials -->
  <text x="256" y="425" text-anchor="middle" fill="white" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" letter-spacing="20" opacity="0.9">PH</text>
</svg>
