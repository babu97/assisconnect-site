  <!-- African shield shape -->
  <path d="M256 24 C345 24, 450 58, 468 145 C486 232, 476 310, 444 372 C412 434, 340 478, 256 498 C172 478, 100 434, 68 372 C36 310, 26 232, 44 145 C62 58, 167 24, 256 24Z" fill="url(#bg)"/>

