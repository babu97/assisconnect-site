  <path d="M256 56 C335 56, 425 85, 442 160 C458 235, 450 305, 422 360 C394 415, 330 452, 256 470 C182 452, 118 415, 90 360 C62 305, 54 235, 70 160 C87 85, 177 56, 256 56Z" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2.5" stroke-dasharray="8 6"/>

