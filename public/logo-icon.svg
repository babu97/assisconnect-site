  <g opacity="0.06" transform="translate(185, 100) scale(0.5)">
    <path d="M160 20 C175 15, 190 10, 210 15 C230 20, 245 10, 260 5 C275 0, 290 5, 295 20 C300 35, 310 45, 305 65 C300 85, 310 100, 315 120 C320 140, 310 155, 300 170 C290 185, 295 205, 290 225 C285 245, 270 260, 260 280 C250 300, 260 320, 255 340 C250 360, 235 380, 220 390 C205 400, 190 395, 180 380 C170 365, 155 360, 140 345 C125 330, 115 310, 110 290 C105 270, 95 255, 90 235 C85 215, 80 195, 85 175 C90 155, 100 140, 105 120 C110 100, 115 80, 125 65 C135 50, 145 35, 160 20Z" fill="white"/>
