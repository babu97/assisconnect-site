  <path d="M160 135 C185 95, 220 75, 256 75 C292 75, 327 95, 352 135" fill="none" stroke="url(#wave)" stroke-width="8" stroke-linecap="round" opacity="0.35"/>
  <path d="M185 155 C200 125, 228 110, 256 110 C284 110, 312 125, 327 155" fill="none" stroke="url(#wave)" stroke-width="8" stroke-linecap="round" opacity="0.55"/>
  <path d="M210 175 C220 155, 238 145, 256 145 C274 145, 292 155, 302 175" fill="none" stroke="url(#wave)" stroke-width="8" stroke-linecap="round" opacity="0.8"/>

  <!-- Phone handset - centered -->
  <g transform="translate(256, 290) rotate(-135)">
    <rect x="-75" y="-22" width="150" height="44" rx="22" fill="white"/>
    <rect x="-80" y="-35" width="50" height="70" rx="14" fill="white"/>
    <rect x="30" y="-35" width="50" height="70" rx="14" fill="white"/>
  </g>

  <!-- Decorative dots - African beadwork inspired -->
  <circle cx="256" cy="55" r="5" fill="url(#amber)"/>
  <circle cx="280" cy="50" r="3" fill="url(#amber)" opacity="0.6"/>
  <circle cx="232" cy="50" r="3" fill="url(#amber)" opacity="0.6"/>
  <circle cx="304" cy="52" r="2.5" fill="url(#amber)" opacity="0.4"/>
  <circle cx="208" cy="52" r="2.5" fill="url(#amber)" opacity="0.4"/>

  <!-- Bottom accent diamond -->
  <g transform="translate(256, 438) rotate(45)">
    <rect x="-7" y="-7" width="14" height="14" rx="3" fill="url(#amber)"/>
